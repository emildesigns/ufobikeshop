<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFO Bike Shop | Deep Digital Store</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --cyan: #00e5ff;
            --cyan-glow: rgba(0,229,255,0.3);
            --black: #0a0a0f;
            --dark: #111118;
            --card: #16161f;
            --border: rgba(0,229,255,0.2);
            --text: #e8e8f0;
            --muted: #888899;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Exo 2', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--black); color: var(--text); font-family: var(--font-body); line-height: 1.6; }

        /* Cursor Personalizado */
        #cursor {
            width: 20px; height: 20px; border: 2px solid var(--cyan); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            transform: translate(-50%,-50%); box-shadow: 0 0 10px var(--cyan);
        }

        /* Navegación */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(10,10,15,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; height: 70px;
        }
        .nav-logo { font-family: var(--font-display); color: var(--cyan); text-decoration: none; font-weight: 900; letter-spacing: 3px; }
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { color: var(--muted); text-decoration: none; font-family: var(--font-display); font-size: 0.7rem; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

        /* Contenedores de Página */
        .page { display: none; padding: 120px 5% 50px; min-height: 100vh; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid de Productos */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; margin-top: 40px;
        }
        .card {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 12px; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .card:hover { border-color: var(--cyan); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card h3 { font-family: var(--font-display); font-size: 1rem; margin-bottom: 10px; color: white; }
        .price { color: var(--cyan); font-weight: 700; font-size: 1.2rem; display: block; margin-bottom: 15px; }
        .btn-buy {
            width: 100%; background: transparent; border: 1px solid var(--cyan);
            color: var(--cyan); padding: 10px; font-family: var(--font-display);
            font-size: 0.7rem; font-weight: 700; transition: 0.3s;
        }
        .btn-buy:hover { background: var(--cyan); color: black; }

        /* Panel Admin */
        .admin-container { display: grid; grid-template-columns: 350px 1fr; gap: 40px; }
        .admin-form { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-family: var(--font-display); font-size: 0.65rem; color: var(--cyan); margin-bottom: 8px; }
        .form-group input {
            width: 100%; background: var(--dark); border: 1px solid var(--border);
            padding: 12px; color: white; border-radius: 6px; outline: none;
        }
        .form-group input:focus { border-color: var(--cyan); }

        footer { text-align: center; padding: 60px; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <nav>
        <a href="#" class="nav-logo" onclick="showPage('home')">UFO BIKESHOP</a>
        <ul class="nav-links">
            <li><a href="#" id="link-home" onclick="showPage('home')" class="active">Tienda</a></li>
            <li><a href="#" id="link-admin" onclick="showPage('admin')">Admin</a></li>
        </ul>
    </nav>

    <section id="home" class="page active">
        <h1 style="font-family: var(--font-display); text-align: center;">CATÁLOGO <span style="color: var(--cyan);">INTERGALÁCTICO</span></h1>
        <div id="product-grid" class="product-grid">
            </div>
    </section>

    <section id="admin" class="page">
        <div class="admin-container">
            <div class="admin-form">
                <h2 style="font-family: var(--font-display); margin-bottom: 25px; font-size: 1rem;">NUEVO PRODUCTO</h2>
                <div class="form-group">
                    <label>NOMBRE DEL MODELO</label>
                    <input type="text" id="p-name" placeholder="Ej: Venzo Skyline">
                </div>
                <div class="form-group">
                    <label>PRECIO (ARS)</label>
                    <input type="number" id="p-price" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>STOCK DISPONIBLE</label>
                    <input type="number" id="p-stock" placeholder="1">
                </div>
                <button class="btn-buy" onclick="saveProduct()" style="background: var(--cyan); color: black;">SUBIR A LA NAVE</button>
                <button onclick="logout()" style="margin-top: 20px; background: none; border: none; color: #ff4444; font-size: 0.6rem; letter-spacing: 1px; width: 100%;">CERRAR SESIÓN</button>
            </div>
            <div id="admin-list">
                <h2 style="font-family: var(--font-display); margin-bottom: 25px; font-size: 1rem;">INVENTARIO ACTUAL</h2>
                <div id="inventory-container"></div>
            </div>
        </div>
    </section>

    <footer>
        👽 UFO BIKE SHOP<br>
        © 2026 UFO Bike Shop · Tucumán, Argentina<br>
        Powered by MercadoPago 🔒
    </footer>

    <script>
        // 1. CONFIGURACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyAjhXwzb8Et49_vy2Mz-mRT2a_h83HFHvQ",
            authDomain: "ufobikeshop.firebaseapp.com",
            databaseURL: "https://ufobikeshop-default-rtdb.firebaseio.com",
            projectId: "ufobikeshop",
            storageBucket: "ufobikeshop.appspot.com",
            messagingSenderId: "668306980892",
            appId: "1:668306980892:web:01c597c856771294ed5fd9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let currentUser = null;

        // 2. MONITOR DE SESIÓN
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if(user) console.log("Admin autenticado");
        });

        // 3. NAVEGACIÓN PROTEGIDA
        async function showPage(pageId) {
            if (pageId === 'admin' && !currentUser) {
                const email = prompt("ID DE COMANDANTE (Email):");
                const pass = prompt("CÓDIGO DE ACCESO:");
                if (!email || !pass) return;

                try {
                    await auth.signInWithEmailAndPassword(email, pass);
                } catch (error) {
                    alert("ACCESO DENEGADO");
                    return;
                }
            }

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            const activeLink = document.getElementById('link-' + pageId);
            if(activeLink) activeLink.classList.add('active');
            
            window.scrollTo(0,0);
        }

        // 4. LÓGICA DE PRODUCTOS (DB)
        function loadProducts() {
            db.ref('products').on('value', snapshot => {
                const data = snapshot.val();
                renderStore(data);
                renderAdminList(data);
            });
        }

        function renderStore(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            if(!products) { grid.innerHTML = "<p>No hay naves disponibles en el hangar.</p>"; return; }

            Object.values(products).forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <h3>${p.name}</h3>
                        <span class="price">$${Number(p.price).toLocaleString()}</span>
                        <p style="font-size:0.7rem; color:var(--muted); margin-bottom:15px;">Stock: ${p.stock}</p>
                        <button class="btn-buy" onclick="iniciarPago('${p.id}', '${p.name}', ${p.price})">ADQUIRIR</button>
                    </div>
                `;
            });
        }

        function renderAdminList(products) {
            const container = document.getElementById('inventory-container');
            container.innerHTML = "";
            if(!products) return;

            Object.values(products).forEach(p => {
                container.innerHTML += `
                    <div style="background:var(--dark); padding:15px; border:1px solid var(--border); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <strong style="color:var(--cyan)">${p.name}</strong><br>
                            <span style="font-size:0.8rem">$${p.price} | Stock: ${p.stock}</span>
                        </div>
                        <button onclick="deleteProduct('${p.id}')" style="background:none; border:none; color:red; cursor:pointer;">ELIMINAR</button>
                    </div>
                `;
            });
        }

        // 5. ACCIONES
        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const stock = document.getElementById('p-stock').value;

            if(!name || !price) return alert("Faltan datos");

            const id = Date.now().toString();
            db.ref('products/' + id).set({
                id, name, price: Number(price), stock: Number(stock)
            }).then(() => {
                alert("Producto sincronizado");
                document.getElementById('p-name').value = "";
                document.getElementById('p-price').value = "";
                document.getElementById('p-stock').value = "";
            });
        }

        function deleteProduct(id) {
            if(confirm("¿Eliminar del inventario?")) db.ref('products/' + id).remove();
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        // 6. MERCADO PAGO INTEGRACIÓN
        async function iniciarPago(id, name, price) {
            alert("Iniciando conexión con Mercado Pago para: " + name);
            // Aquí llamarías a tu función fetch('/api/create-preference') 
            // que ya tienes configurada en Vercel.
        }

        // 7. CURSOR
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor');
            c.style.left = e.clientX + 'px';
            c.style.top = e.clientY + 'px';
        });

        // INICIO AUTOMÁTICO
        loadProducts();

    </script>
</body>
</html>
