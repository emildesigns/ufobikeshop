<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO Bike Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  /* Mantenemos exactamente tus estilos originales */
  :root {
    --cyan: #00e5ff;
    --cyan-dim: #00b8cc;
    --cyan-glow: rgba(0,229,255,0.15);
    --black: #0a0a0f;
    --dark: #111118;
    --card: #16161f;
    --border: rgba(0,229,255,0.2);
    --text: #e8e8f0;
    --muted: #888899;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Exo 2', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: var(--font-body); overflow-x: hidden; cursor: none; }

  #cursor {
    width: 18px; height: 18px; border: 2px solid var(--cyan); border-radius: 50%;
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
    transition: transform 0.1s; transform: translate(-50%,-50%);
  }

  nav {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(10,10,15,0.9); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border); display: flex;
    align-items: center; justify-content: space-between; padding: 0 48px; height: 70px;
  }

  .nav-logo { font-family: var(--font-display); color: var(--cyan); text-decoration: none; font-weight: 900; letter-spacing: 3px; }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-family: var(--font-display);
    font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--cyan); }

  .page { display: none; padding-top: 70px; min-height: 100vh; }
  .page.active { display: block; }

  /* Estilos para el Panel Admin */
  .admin-container { padding: 40px; max-width: 800px; margin: 0 auto; }
  .admin-form { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 8px; }
  .admin-form input {
    width: 100%; background: var(--dark); border: 1px solid var(--border);
    color: white; padding: 12px; margin-bottom: 15px; border-radius: 4px; outline: none;
  }
  .btn-admin {
    background: var(--cyan); color: var(--black); border: none; padding: 12px;
    font-family: var(--font-display); font-weight: 700; width: 100%; cursor: none;
  }
</style>
</head>
<body>

<div id="cursor"></div>

<nav>
  <a href="#" class="nav-logo" onclick="showPage('home')">UFO BIKESHOP</a>
  <ul class="nav-links">
    <li><a href="#" id="link-home" onclick="showPage('home')" class="active">Tienda</a></li>
    <li><a href="#" id="link-admin" onclick="showPage('admin')">Admin</a></li>
  </ul>
</nav>

<section id="home" class="page active">
  <div style="padding: 100px 48px; text-align: center;">
    <h1 style="font-family: var(--font-display); font-size: 3rem; margin-bottom: 20px;">
      CATÁLOGO <span style="color: var(--cyan);">INTERGALÁCTICO</span>
    </h1>
    <div id="product-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
      </div>
  </div>
</section>

<section id="admin" class="page">
  <div class="admin-container">
    <div class="admin-form">
      <h2 style="font-family: var(--font-display); color: var(--cyan); margin-bottom: 20px; font-size: 1rem;">NUEVO PRODUCTO</h2>
      <input type="text" id="p-name" placeholder="Nombre del modelo">
      <input type="number" id="p-price" placeholder="Precio ARS">
      <input type="number" id="p-stock" placeholder="Stock">
      <button class="btn-admin" onclick="saveProduct()">SUBIR A LA NAVE</button>
      <button onclick="logout()" style="margin-top: 20px; background: none; border: none; color: #ff4444; font-size: 0.6rem; cursor: none; width: 100%;">CERRAR SESIÓN</button>
    </div>
  </div>
</section>

<script>
  // 1. CONFIGURACIÓN FIREBASE (Tus credenciales reales)
  const firebaseConfig = {
    apiKey: "AIzaSyAjhXwzb8Et49_vy2Mz-mRT2a_h83HFHvQ",
    authDomain: "ufobikeshop.firebaseapp.com",
    databaseURL: "https://ufobikeshop-default-rtdb.firebaseio.com",
    projectId: "ufobikeshop",
    storageBucket: "ufobikeshop.appspot.com",
    messagingSenderId: "668306980892",
    appId: "1:668306980892:web:01c597c856771294ed5fd9"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  let userLogged = null;

  // 2. MONITOR DE SESIÓN
  auth.onAuthStateChanged(user => {
    userLogged = user;
  });

  // 3. NAVEGACIÓN CON LOGIN INTEGRADO
  async function showPage(pageId) {
    if (pageId === 'admin' && !userLogged) {
      const email = prompt("ID DE COMANDANTE (Email):");
      const pass = prompt("CÓDIGO DE ACCESO:");
      
      if (email && pass) {
        try {
          await auth.signInWithEmailAndPassword(email, pass);
        } catch (error) {
          alert("ACCESO DENEGADO: Credenciales incorrectas.");
          return;
        }
      } else {
        return;
      }
    }

    // Cambiar visualmente las páginas
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');

    // Cambiar estado de los links
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    const activeLink = document.getElementById('link-' + pageId);
    if(activeLink) activeLink.classList.add('active');
  }

  // 4. LÓGICA DE PRODUCTOS
  function loadProducts() {
    db.ref('products').on('value', snapshot => {
      const data = snapshot.val();
      const grid = document.getElementById('product-grid');
      grid.innerHTML = "";
      if(data) {
        Object.values(data).forEach(p => {
          grid.innerHTML += `
            <div style="background:var(--card); border:1px solid var(--border); padding:20px; border-radius:8px; text-align:left;">
              <h3 style="font-family:var(--font-display); font-size:0.9rem; color:white;">${p.name}</h3>
              <p style="color:var(--cyan); font-weight:700; margin:10px 0;">$${Number(p.price).toLocaleString()}</p>
              <button class="btn-admin" style="font-size:0.6rem; padding:8px;">COMPRAR</button>
            </div>
          `;
        });
      }
    });
  }

  function saveProduct() {
    const name = document.getElementById('p-name').value;
    const price = document.getElementById('p-price').value;
    const stock = document.getElementById('p-stock').value;

    if(!name || !price) return alert("Completa los datos");

    const id = Date.now();
    db.ref('products/' + id).set({
      id, name, price: Number(price), stock: Number(stock)
    }).then(() => {
      alert("Producto cargado con éxito");
      document.getElementById('p-name').value = "";
      document.getElementById('p-price').value = "";
    });
  }

  function logout() {
    auth.signOut().then(() => location.reload());
  }

  // 5. CURSOR NEÓN
  document.addEventListener('mousemove', e => {
    const cursor = document.getElementById('cursor');
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // Inicializar
  loadProducts();

</script>
</body>
</html>
