<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFO Bike Shop | Deep Digital</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* [Aquí mantenemos todos tus estilos CSS previos por brevedad, pero asegúrate de que el bloque <style> cierre correctamente] */
        :root {
            --cyan: #00e5ff; --cyan-glow: rgba(0,229,255,0.15); --black: #0a0a0f;
            --dark: #111118; --card: #16161f; --border: rgba(0,229,255,0.2);
            --text: #e8e8f0; --muted: #888899; --font-display: 'Orbitron', sans-serif;
            --font-body: 'Exo 2', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--black); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }
        #cursor { width: 18px; height: 18px; border: 2px solid var(--cyan); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: transform 0.1s; }
        nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(10,10,15,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 70px; }
        .nav-logo { font-family: var(--font-display); color: var(--cyan); text-decoration: none; font-weight: 900; letter-spacing: 3px; }
        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-links a { color: var(--muted); text-decoration: none; font-family: var(--font-display); font-size: 0.65rem; text-transform: uppercase; transition: 0.2s; }
        .nav-links a.active { color: var(--cyan); }
        .page { display: none; padding-top: 70px; min-height: 100vh; }
        .page.active { display: block; }
        .section { padding: 80px 48px; }
        /* Estilos del Admin */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; padding: 40px; }
        .admin-form { background: var(--card); border: 1px solid var(--border); padding: 32px; border-radius: 8px; }
        input { width: 100%; background: var(--dark); border: 1px solid var(--border); color: white; padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .btn-primary { background: var(--cyan); color: black; border: none; padding: 12px 24px; font-family: var(--font-display); font-weight: 700; width: 100%; }
        
        /* Carrito lateral */
        .cart-sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: 350px; background: var(--dark); border-left: 1px solid var(--border); z-index: 2001; transform: translateX(100%); transition: 0.3s; padding: 20px; }
        .cart-sidebar.open { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <nav>
        <a href="#" class="nav-logo" onclick="showPage('home')">UFO BIKESHOP</a>
        <ul class="nav-links">
            <li><a href="#" id="link-home" onclick="showPage('home')" class="active">Tienda</a></li>
            <li><a href="#" id="link-servicios" onclick="showPage('servicios')">Servicios</a></li>
            <li><a href="#" id="link-admin" onclick="showPage('admin')">Admin</a></li>
        </ul>
        <button class="cart-btn" onclick="toggleCart()">CARRITO <span id="cart-count">0</span></button>
    </nav>

    <section id="home" class="page active">
        <div class="section">
            <h1 style="font-family: var(--font-display); text-align: center; margin-bottom: 40px;">CATÁLOGO <span style="color: var(--cyan);">INTERGALÁCTICO</span></h1>
            <div id="product-grid" class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
                </div>
        </div>
    </section>

    <section id="admin" class="page">
        <div class="admin-grid">
            <div class="admin-form">
                <h2 style="font-family: var(--font-display); color: var(--cyan); margin-bottom: 20px;">PANEL DE CONTROL</h2>
                <input type="text" id="p-name" placeholder="Nombre de la Bicicleta">
                <input type="number" id="p-price" placeholder="Precio ARS">
                <input type="number" id="p-stock" placeholder="Stock">
                <button class="btn-primary" onclick="saveProduct()">GUARDAR PRODUCTO</button>
                <button onclick="logout()" style="background:none; border:none; color:red; margin-top:20px; font-size:0.6rem;">CERRAR SESIÓN</button>
            </div>
            <div id="admin-list">
                </div>
        </div>
    </section>

    <div id="cart-sidebar" class="cart-sidebar">
        <h2 style="font-family: var(--font-display); color: var(--cyan);">TU PEDIDO</h2>
        <div id="cart-items" style="margin: 20px 0;"></div>
        <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 15px;">
        <div style="display: flex; justify-content: space-between; font-family: var(--font-display);">
            <span>TOTAL:</span>
            <span id="cart-total" style="color: var(--cyan);">$0</span>
        </div>
        <button class="btn-primary" style="margin-top: 20px;" onclick="checkout()">FINALIZAR COMPRA</button>
        <button onclick="toggleCart()" style="background:none; color:white; border:none; width:100%; margin-top:10px;">Cerrar</button>
    </div>

    <footer>
        👽 UFO BIKE SHOP · Tucumán, Argentina · 2026
    </footer>

    <script>
        // 1. CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAjhXwzb8Et49_vy2Mz-mRT2a_h83HFHvQ",
            authDomain: "ufobikeshop.firebaseapp.com",
            databaseURL: "https://ufobikeshop-default-rtdb.firebaseio.com",
            projectId: "ufobikeshop",
            storageBucket: "ufobikeshop.appspot.com",
            messagingSenderId: "668306980892",
            appId: "1:668306980892:web:01c597c856771294ed5fd9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let currentUser = null;
        let cart = [];

        // 2. NAVEGACIÓN
        async function showPage(pageId) {
            if (pageId === 'admin' && !currentUser) {
                const email = prompt("EMAIL DE ACCESO:");
                const pass = prompt("CONTRASEÑA:");
                if (!email || !pass) return;
                try {
                    await auth.signInWithEmailAndPassword(email, pass);
                } catch (e) { alert("Acceso denegado"); return; }
            }
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById('link-' + pageId).classList.add('active');
        }

        // 3. DATOS REALTIME
        db.ref('products').on('value', snapshot => {
            const products = snapshot.val();
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            if (!products) return;

            Object.values(products).forEach(p => {
                grid.innerHTML += `
                    <div style="background:var(--card); padding:20px; border:1px solid var(--border); border-radius:8px;">
                        <h3 style="color:white; margin-bottom:10px;">${p.name}</h3>
                        <p style="color:var(--cyan); font-weight:bold; font-size:1.2rem;">$${Number(p.price).toLocaleString()}</p>
                        <button class="btn-primary" style="margin-top:15px; font-size:0.6rem;" onclick="addToCart('${p.name}', ${p.price})">AÑADIR AL CARRITO</button>
                    </div>
                `;
            });
        });

        // 4. CARRITO
        function addToCart(name, price) {
            cart.push({name, price});
            updateCart();
            alert(name + " subido a la nave.");
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map(i => `<p style="font-size:0.8rem; margin-bottom:5px;">${i.name} - $${i.price}</p>`).join("");
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('cart-total').innerText = "$" + total.toLocaleString();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
        }

        // 5. ACCIÓN ADMIN
        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const stock = document.getElementById('p-stock').value;
            if(!name || !price) return alert("Faltan datos");
            const id = Date.now();
            db.ref('products/' + id).set({ id, name, price: Number(price), stock: Number(stock) })
            .then(() => alert("Producto sincronizado."));
        }

        // 6. CURSOR
        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        auth.onAuthStateChanged(user => currentUser = user);
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
