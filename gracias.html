<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Gracias por tu compra! — UFO Bike Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00e5ff; --black: #0a0a0f; --dark: #111118;
    --card: #16161f; --border: rgba(0,229,255,0.2);
    --text: #e8e8f0; --muted: #888899;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Exo 2', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--black); color: var(--text);
    font-family: var(--font-body); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .container {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 56px 48px; max-width: 520px;
    width: 100%; text-align: center;
    box-shadow: 0 0 60px rgba(0,229,255,0.08);
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .check-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(0,229,255,0.1); border: 2px solid var(--cyan);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin: 0 auto 24px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.3); }
    50%      { box-shadow: 0 0 0 16px rgba(0,229,255,0); }
  }
  h1 { font-family: var(--font-display); font-size: 1.6rem; font-weight:900; color:#fff; margin-bottom:12px; letter-spacing:2px; }
  h1 span { color: var(--cyan); }
  .subtitle { color: var(--muted); font-size: 0.95rem; line-height: 1.7; margin-bottom: 32px; }
  .order-box {
    background: var(--dark); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px; margin-bottom: 32px; text-align: left;
  }
  .order-row { display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid rgba(0,229,255,0.06); font-size: 0.85rem; }
  .order-row:last-child { border-bottom: none; }
  .order-label { color: var(--muted); }
  .order-value { color: #fff; font-family: var(--font-display); font-size: 0.7rem; letter-spacing: 1px; }
  .order-value.success { color: var(--cyan); }
  .btn-home {
    display: inline-block; background: var(--cyan); color: var(--black);
    padding: 14px 36px; border-radius: 4px; text-decoration: none;
    font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 3px;
    font-weight: 700; transition: all 0.2s;
  }
  .btn-home:hover { box-shadow: 0 0 30px rgba(0,229,255,0.5); }
  .footer-note { margin-top: 24px; font-size: 0.75rem; color: var(--muted); }
  @media(max-width:480px) { .container { padding: 36px 20px; } h1 { font-size: 1.2rem; } }
</style>
</head>
<body>
<div class="container">
  <div class="check-icon">✅</div>
  <h1>¡GRACIAS POR TU <span>COMPRA!</span></h1>
  <p class="subtitle">Tu pago fue procesado correctamente. En breve recibirás un email de confirmación con los detalles de tu pedido.</p>

  <div class="order-box">
    <div class="order-row">
      <span class="order-label">Estado del pago</span>
      <span class="order-value success" id="pay-status">APROBADO ✓</span>
    </div>
    <div class="order-row">
      <span class="order-label">N° de pedido</span>
      <span class="order-value" id="order-ref">—</span>
    </div>
    <div class="order-row">
      <span class="order-label">ID de pago</span>
      <span class="order-value" id="pay-id">—</span>
    </div>
  </div>

  <a href="index.html" class="btn-home">👽 VOLVER A LA TIENDA</a>
  <p class="footer-note">¿Preguntas? Contactanos por <a href="https://wa.me/543813304791" style="color:var(--cyan)">WhatsApp</a></p>
</div>

<script>
  const FIREBASE_DB_URL = 'https://ufobikeshop-default-rtdb.firebaseio.com';

  // ─── Leer parámetros que manda MercadoPago en la URL ───
  const params     = new URLSearchParams(window.location.search);
  const status     = params.get('status')             || 'approved';
  const payId      = params.get('payment_id')         || '—';
  const extRef     = params.get('external_reference') || '—';

  document.getElementById('pay-id').textContent    = payId;
  document.getElementById('order-ref').textContent = extRef;

  if (status !== 'approved') {
    document.getElementById('pay-status').textContent = status.toUpperCase();
    document.getElementById('pay-status').style.color = '#ffd700';
    document.querySelector('h1').innerHTML = '¡PAGO <span>PENDIENTE</span>!';
    document.querySelector('.subtitle').textContent =
      'Tu pago está siendo procesado. Te notificaremos por email cuando se confirme.';
  }

  // ─── Firebase helpers ───
  async function fbGet(path) {
    try {
      const r = await fetch(`${FIREBASE_DB_URL}/${path}.json`);
      return r.json();
    } catch(e) { return null; }
  }
  async function fbPatch(path, data) {
    try {
      await fetch(`${FIREBASE_DB_URL}/${path}.json`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    } catch(e) { console.error('fbPatch error:', e); }
  }

  // ─── Procesar pago aprobado ───
  async function procesarPagoAprobado(orderId) {
    const order = await fbGet(`orders/${orderId}`);
    if (!order) { console.warn('Pedido no encontrado en Firebase:', orderId); return; }

    const yaProcessado = order.paymentStatus === 'approved' && order.stockDescontado;

    // ── Actualizar estado y descontar stock solo si no fue procesado antes ──
    if (!yaProcessado) {
      await fbPatch(`orders/${orderId}`, {
        paymentStatus:   'approved',
        paymentId:       payId !== '—' ? payId : (order.paymentId || ''),
        approvedAt:      new Date().toISOString(),
        stockDescontado: true,
      });

      const items = order.items || [];
      for (const item of items) {
        const prod = await fbGet(`products/${item.id}`);
        if (prod && prod.stock !== null && prod.stock !== undefined) {
          const nuevoStock = Math.max(0, Number(prod.stock) - Number(item.qty));
          await fbPatch(`products/${item.id}`, { stock: nuevoStock });
          console.log(`Stock actualizado: ${prod.name} → ${nuevoStock} unidades`);
        }
      }
    } else {
      console.log('Stock ya descontado anteriormente — saltando ese paso.');
    }

    // ── Enviar email SIEMPRE (aunque el stock ya estuviera descontado) ──
    // Solo enviar si no se envió antes
    if (!order.emailEnviado) {
      try {
        console.log('Datos del pedido a enviar por email:', JSON.stringify({
          orderId,
          buyer: order.buyer,
          shipping: order.shipping,
          shippingCost: order.shippingCost,
          subtotal: order.subtotal,
          total: order.total,
          items: order.items?.length
        }));
        console.log('Enviando notificación por email...');
        const emailRes = await fetch('/api/send-notification', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderId,
            items:      order.items || [],
            total:      order.total || 0,
            subtotal:   order.subtotal || order.total || 0,
            shipping:   order.shipping || null,
            shippingCost: order.shippingCost || 0,
            buyer:      order.buyer || null,
            approvedAt: new Date().toISOString(),
          }),
        });
        const emailData = await emailRes.json();
        console.log('Respuesta del servidor de email:', emailData);
        if (emailData.ok) {
          console.log('Email enviado correctamente.');
          await fbPatch(`orders/${orderId}`, { emailEnviado: true });
        } else {
          console.warn('Email no enviado — respuesta:', emailData);
        }
      } catch(emailErr) {
        console.warn('Error al enviar email:', emailErr.message);
      }
    } else {
      console.log('Email ya enviado anteriormente — no se reenvía.');
    }

    console.log('Pedido procesado correctamente:', orderId);
  }

  // ─── Ejecutar solo si el pago fue aprobado y hay ID de pedido ───
  if (status === 'approved' && extRef && extRef !== '—') {
    procesarPagoAprobado(extRef);
  }
</script>
</body>
</html>
